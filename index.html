<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Nexus Business PR SaaS</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
  <div id="toast" class="toast"></div>
  <section id="authView" class="auth-page">
    <div class="auth-card">
      <div class="mark">NX</div>
      <h1>Nexus Business PR</h1>
      <p>Plataforma SaaS para negocios de servicios en Puerto Rico.</p>
      <div class="grid2">
        <input id="authName" placeholder="Nombre del negocio" />
        <select id="authIndustry">
          <option value="general">Servicios Generales</option>
          <option value="transport">Transporte</option>
          <option value="hvac">HVAC</option>
          <option value="salon">Salón / Barbería</option>
          <option value="handyman">Handyman</option>
          <option value="cleaning">Limpieza</option>
          <option value="construction">Construcción</option>
          <option value="mechanic">Mecánica Móvil</option>
        </select>
      </div>
      <input id="authEmail" type="email" placeholder="Email" />
      <input id="authPass" type="password" placeholder="Contraseña" />
      <div class="auth-actions">
        <button id="btnLogin" class="btn primary">Entrar</button>
        <button id="btnRegister" class="btn ghost">Crear cuenta</button>
      </div>
      <button id="btnResetPass" class="linkbtn">Recuperar contraseña</button>
      <small>Datos privados por usuario. Firebase Auth + Firestore Rules por UID.</small>
    </div>
  </section>

  <section id="appView" class="app hidden">
    <aside class="sidebar">
      <div class="side-brand"><div class="mark small">NX</div><div><b id="sideBiz">Nexus Business</b><span id="sidePlan">Plan Starter</span></div></div>
      <nav id="nav"></nav>
      <div class="side-footer">
        <button id="btnSync" class="btn tiny">Sincronizar</button>
        <button id="btnLogout" class="btn tiny ghost">Salir</button>
      </div>
    </aside>
    <main class="main">
      <header class="topline">
        <div><h2 id="pageTitle">Dashboard</h2><p id="pageHint">Operación centralizada.</p></div>
        <div class="status"><span id="cloudDot"></span><span id="cloudText">Conectando</span></div>
      </header>

      <section id="dashboard" class="page"></section>
      <section id="clients" class="page hidden"></section>
      <section id="services" class="page hidden"></section>
      <section id="team" class="page hidden"></section>
      <section id="invoices" class="page hidden"></section>
      <section id="payments" class="page hidden"></section>
      <section id="cashflow" class="page hidden"></section>
      <section id="reports" class="page hidden"></section>
      <section id="plans" class="page hidden"></section>
      <section id="settings" class="page hidden"></section>
    </main>
  </section>
  <script type="module" src="app.js"></script>
</body>
</html>
